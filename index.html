<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>頭竹苗大家庭 | 特約商店福利網</title>
  <meta name="description" content="竹南、頭份、苗栗最有人情味的在地社團特約商店查詢系統。">
  <style>
    /* ========================================
       粉紫色系 CSS 變數定義 
       ======================================== */
    :root {
      --primary-color: #a67cba; /* 質感霧紫 (主色) */
      --primary-dark: #8b5ca1;  /* 深紫色 (標題/強調) */
      --primary-light: #f2e6f7; /* 淺紫背景 */
      --accent-color: #e89bc5;  /* 櫻花粉 (按鈕/強調) */
      --bg-color: #fdfafc;      /* 極淺紫白背景 */
      --card-bg: #ffffff;
      --text-main: #4a4a4a;
      --text-muted: #7a7a7a;
      --border-color: #eaddf0;
      --shadow-sm: 0 2px 8px rgba(166, 124, 186, 0.1);
      --shadow-md: 0 6px 16px rgba(166, 124, 186, 0.15);
      --radius-lg: 16px;
      --radius-md: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ========================================
       導航列 
       ======================================== */
    header {
      background-color: var(--card-bg);
      padding: 12px 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: var(--shadow-sm);
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 2px solid var(--primary-light);
    }

    .logo-container {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 1px;
    }

    /* ========================================
       主視覺區塊 (Hero)
       ======================================== */
    .hero {
      background: linear-gradient(145deg, var(--primary-light) 0%, #ffffff 100%);
      padding: 50px 20px 40px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
    }

    .hero h1 {
      color: var(--primary-dark);
      margin-bottom: 12px;
      font-size: 1.8rem;
      font-weight: 800;
    }

    .hero p {
      color: var(--text-muted);
      margin-bottom: 30px;
      font-size: 1rem;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 400px;
      margin: 0 auto;
    }

    @media(min-width: 768px) {
      .action-buttons {
        flex-direction: row;
        max-width: 800px;
        justify-content: center;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: 50px; /* 圓潤按鈕設計 */
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    @media(min-width: 768px) {
      .btn { width: auto; min-width: 180px; }
    }

    .btn:active { transform: scale(0.96); }

    .btn-pink {
      background-color: var(--accent-color);
      color: white;
      box-shadow: 0 4px 10px rgba(232, 155, 197, 0.3);
    }
    .btn-pink:hover { background-color: #d689b2; }

    .btn-purple {
      background-color: var(--primary-color);
      color: white;
      box-shadow: 0 4px 10px rgba(166, 124, 186, 0.3);
    }
    .btn-purple:hover { background-color: var(--primary-dark); }

    .btn-outline {
      background-color: white;
      color: var(--primary-dark);
      border: 2px solid var(--primary-color);
    }
    .btn-outline:hover { background-color: var(--primary-light); }

    /* ========================================
       共用標題與表單輸入框
       ======================================== */
    .section-title {
      text-align: center;
      padding: 40px 20px 20px;
      color: var(--primary-dark);
      font-size: 1.5rem;
      font-weight: 700;
    }

    .section-title span {
      display: inline-block;
      border-bottom: 3px solid var(--accent-color);
      padding-bottom: 5px;
    }

    .input-field {
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: all 0.3s ease;
      background-color: white;
      color: var(--text-main);
    }

    .input-field:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    /* ========================================
       搜尋與過濾區塊
       ======================================== */
    .search-container {
      padding: 0 20px 25px;
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media(min-width: 768px) {
      .search-container {
        grid-template-columns: 2fr 1fr 1fr;
      }
    }

    /* ========================================
       店家卡片列表
       ======================================== */
    .store-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 0 20px 50px;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media(min-width: 768px) {
      .store-list { grid-template-columns: repeat(2, 1fr); }
    }
    
    @media(min-width: 1024px) {
      .store-list { grid-template-columns: repeat(3, 1fr); }
    }

    .store-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .store-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary-color);
    }

    .store-header {
      margin-bottom: 12px;
    }

    .store-name {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--primary-dark);
      margin-bottom: 8px;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      background-color: var(--primary-light);
      color: var(--primary-dark);
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
    }

    .badge-pink {
      background-color: #fbebf3;
      color: #c95c94;
    }

    .store-discount {
      background-color: #faf7fc;
      border-left: 4px solid var(--accent-color);
      padding: 12px 15px;
      margin: 15px 0;
      border-radius: 0 8px 8px 0;
      font-size: 0.95rem;
      color: var(--text-main);
      flex-grow: 1; 
      line-height: 1.5;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .action-btn {
      flex: 1;
      background: #f7f3f9;
      border: none;
      padding: 10px 0;
      border-radius: var(--radius-md);
      color: var(--primary-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .action-btn:hover { 
      background: var(--primary-color); 
      color: white; 
    }

    /* ========================================
       表單區塊
       ======================================== */
    .form-container {
      background: white;
      max-width: 600px;
      margin: 0 auto 50px;
      padding: 35px 25px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
    }

    .form-group { margin-bottom: 22px; }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: var(--primary-dark);
    }

    .form-notice {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 15px;
      text-align: center;
    }

    /* 空狀態 */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--primary-dark);
      grid-column: 1 / -1;
      background: white;
      border-radius: var(--radius-lg);
      border: 1px dashed var(--primary-color);
    }

    /* ========================================
       頁尾
       ======================================== */
    footer {
      background-color: var(--primary-dark);
      color: white;
      text-align: center;
      padding: 25px 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- 頂部導航列 -->
  <header>
    <div class="logo-container">
      🌸 頭竹苗大家庭
    </div>
  </header>

  <!-- 主視覺與入口區塊 -->
  <section class="hero">
    <h1>最有人情味的在地社團</h1>
    <p>竹南、頭份、苗栗鄉親專屬特約商店福利網<br>一機在手，優惠隨時有！</p>
    
    <div class="action-buttons">
      <a href="https://lin.ee/rQzJS3i" target="_blank" class="btn btn-pink">
        🎁 免費領取福利卡
      </a>
      <a href="#search-section" class="btn btn-purple">
        🔍 查詢特約商
      </a>
      <a href="#join-section" class="btn btn-outline">
        🤝 加入/修改特約
      </a>
    </div>
  </section>

  <!-- 查詢特約商區塊 -->
  <h2 class="section-title" id="search-section"><span>📍 尋找在地優惠</span></h2>
  
  <div class="search-container">
    <input type="text" id="searchInput" class="input-field" placeholder="請輸入店名或優惠關鍵字...">
    
    <select id="categorySelect" class="input-field">
      <option value="">✨ 所有分類</option>
      <option value="食">🍽️ 食 (餐飲)</option>
      <option value="衣">👗 衣 (服飾)</option>
      <option value="住">🏠 住 (居家)</option>
      <option value="行">🚗 行 (交通)</option>
      <option value="育">📚 育 (教育)</option>
      <option value="樂">🎮 樂 (娛樂)</option>
      <option value="服務業">🤝 服務業</option>
      <option value="零售業">🛍️ 零售業</option>
      <option value="通訊業">📱 通訊業</option>
    </select>
    
    <select id="regionSelect" class="input-field">
      <option value="">🗺️ 所有地區</option>
      <option value="頭份">頭份</option>
      <option value="竹南">竹南</option>
      <option value="苗栗市">苗栗市</option>
      <option value="其他">其他鄉鎮</option>
    </select>
  </div>

  <div class="store-list" id="storeList">
    <!-- 店家卡片將由 JavaScript 動態生成 -->
  </div>

  <!-- 加入/修改特約商區塊 -->
  <h2 class="section-title" id="join-section"><span>🏪 成為特約夥伴</span></h2>
  <div class="form-container">
    <p style="margin-bottom: 25px; color: var(--text-main); text-align: center;">
      想加入特約商店，或更新目前的優惠方案嗎？<br>請填寫下方表單，管理員將會為您審核上架。
    </p>
    <form id="storeForm" onsubmit="handleFormSubmit(event)">
      <div class="form-group">
        <label for="f_name">聯絡人姓名</label>
        <input type="text" id="f_name" class="input-field" required placeholder="請輸入姓名">
      </div>
      <div class="form-group">
        <label for="f_phone">聯絡電話 / LINE ID</label>
        <input type="text" id="f_phone" class="input-field" required placeholder="請輸入聯絡方式">
      </div>
      <div class="form-group">
        <label for="f_storeName">店家名稱</label>
        <input type="text" id="f_storeName" class="input-field" required placeholder="請輸入店名">
      </div>
      <div class="form-group">
        <label for="f_category">商店分類</label>
        <select id="f_category" class="input-field" required>
          <option value="">請選擇分類...</option>
          <option value="食">食</option>
          <option value="衣">衣</option>
          <option value="住">住</option>
          <option value="行">行</option>
          <option value="育">育</option>
          <option value="樂">樂</option>
          <option value="服務業">服務業</option>
          <option value="零售業">零售業</option>
          <option value="通訊業">通訊業</option>
        </select>
      </div>
      <div class="form-group">
        <label for="f_region">所在地區</label>
        <select id="f_region" class="input-field" required>
          <option value="">請選擇地區...</option>
          <option value="頭份">頭份</option>
          <option value="竹南">竹南</option>
          <option value="苗栗市">苗栗市</option>
          <option value="其他">其他鄉鎮</option>
        </select>
      </div>
      <div class="form-group">
        <label for="f_discount">提供福利卡之專屬優惠</label>
        <textarea id="f_discount" class="input-field" rows="4" required placeholder="例：憑頭竹苗大家庭福利卡，全品項享95折優惠..."></textarea>
      </div>
      <button type="submit" class="btn btn-purple" style="width: 100%; border-radius: var(--radius-md);">送出資料</button>
      <p class="form-notice">表單送出後將由社團管理員人工審核，請耐心等候。</p>
    </form>
  </div>

  <footer>
    <p>© 頭竹苗大家庭 保留所有權利 | 最挺苗栗鄉親的在地社群 🌸</p>
  </footer>

  <script>
    // 確切已知的事實資料：從上傳文件中提取之特約商店資料
    const storeData = [
      { name: "丘森茶室", category: "食", region: "全區", discount: "加盟金減免五萬、全台各分店加10元多送一杯原茶" },
      { name: "cafe32", category: "食", region: "頭份", discount: "憑福利卡消費，咖啡&飲品同品項第二杯半價" },
      { name: "買樂購", category: "零售業", region: "其他", discount: "憑福利卡消費，滿500折50。部份商品享鄉親價" },
      { name: "雲朵森林", category: "食", region: "苗栗市", discount: "憑福利卡95折優惠" },
      { name: "南苑渡假莊園", category: "樂", region: "其他", discount: "福利卡用餐消費假日95折/平日9折" },
      { name: "極食玩樂桌遊店", category: "樂", region: "苗栗市", discount: "憑福利卡買三小時送一小時" },
      { name: "和牛涮尚順育樂店", category: "食", region: "頭份", discount: "憑卡消費贈送時令海鮮乙份。15客以上贈1客" },
      { name: "城市漢堡龍山店", category: "食", region: "竹南", discount: "憑福利卡消費送中杯紅茶一杯" },
      { name: "貝拉小巴披薩", category: "食", region: "頭份", discount: "憑福利卡現金消費折10元" },
      { name: "爪哇殿咖啡", category: "食", region: "竹南", discount: "憑福利卡消費300送印尼奶茶或紅茶1杯" },
      { name: "植饗烤物", category: "食", region: "其他", discount: "憑福利卡消費享95折優惠" },
      { name: "親蜜家優床館", category: "住", region: "其他", discount: "專屬優惠價再加贈防瞞抗菌防水透氣保潔墊" },
      { name: "SYM龍辰機車行", category: "行", region: "其他", discount: "不限消費金額98折優惠，排氣定檢送當月小禮物" },
      { name: "愛學館竹南校", category: "育", region: "竹南", discount: "憑福利卡消費可以免費試聽每科科目一堂課" },
      { name: "薩雅芳香療癒家", category: "服務業", region: "頭份", discount: "憑卡一般客人95折, 醫護警消9折" },
      { name: "手機家族", category: "通訊業", region: "頭份", discount: "憑福利卡消費，指定商品享5折優惠" },
      { name: "鹿米美式生活市集", category: "零售業", region: "其他", discount: "滿3000打95折，福利品專區5折優惠" },
      { name: "天心坊湯包", category: "食", region: "竹南", discount: "憑卡消費主餐1份，送紅茶1杯" }
    ];

    // 確保 DOM 載入後才執行邏輯，避免預覽器發生錯誤
    document.addEventListener("DOMContentLoaded", () => {
      const searchInput = document.getElementById('searchInput');
      const categorySelect = document.getElementById('categorySelect');
      const regionSelect = document.getElementById('regionSelect');
      const storeListContainer = document.getElementById('storeList');

      // 渲染店家卡片函式
      function renderStores(stores) {
        storeListContainer.innerHTML = ''; 

        if (stores.length === 0) {
          storeListContainer.innerHTML = `
            <div class="empty-state">
              <h3 style="margin-bottom: 10px;">😢 找不到符合的商店</h3>
              <p>請嘗試更換搜尋關鍵字或分類！</p>
            </div>
          `;
          return;
        }

        // 使用 DocumentFragment 提升渲染效能
        const fragment = document.createDocumentFragment();

        stores.forEach(store => {
          const card = document.createElement('div');
          card.className = 'store-card';
          
          card.innerHTML = `
            <div class="store-header">
              <div class="store-name">${store.name}</div>
              <div class="badges">
                <span class="badge">🔖 ${store.category}</span>
                <span class="badge badge-pink">📍 ${store.region}</span>
              </div>
            </div>
            <div class="store-discount">
              <strong>✨ 專屬優惠：</strong><br>
              ${store.discount}
            </div>
            <div class="card-actions">
              <button class="action-btn" onclick="openMap('${store.name}')">🗺️ 導航</button>
              <button class="action-btn" onclick="shareStore('${store.name}', '${store.discount}')">🔗 分享</button>
              <button class="action-btn" onclick="showDetails('${store.name}')">ℹ️ 詳情</button>
            </div>
          `;
          fragment.appendChild(card);
        });

        storeListContainer.appendChild(fragment);
      }

      // 搜尋與過濾邏輯
      function filterStores() {
        const keyword = searchInput.value.toLowerCase().trim();
        const category = categorySelect.value;
        const region = regionSelect.value;

        const filtered = storeData.filter(store => {
          const matchKeyword = store.name.toLowerCase().includes(keyword) || 
                               store.discount.toLowerCase().includes(keyword);
          const matchCategory = category === "" || store.category === category;
          const matchRegion = region === "" || store.region === region || store.region === "全區" || (store.region === "其他" && region === "其他");

          return matchKeyword && matchCategory && matchRegion;
        });

        renderStores(filtered);
      }

      // 綁定事件監聽器
      searchInput.addEventListener('input', filterStores);
      categorySelect.addEventListener('change', filterStores);
      regionSelect.addEventListener('change', filterStores);

      // 初始化渲染
      renderStores(storeData);
    });

    // 全域函式供按鈕 onclick 呼叫
    function openMap(storeName) {
      const query = encodeURIComponent(storeName + ' 苗栗'); 
      window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
    }

    function shareStore(name, discount) {
      const shareData = {
        title: `推薦特約商店：${name}`,
        text: `🌸 我是頭竹苗大家庭的鄉親！推薦你特約商店【${name}】\n憑福利卡享優惠：${discount}\n快來免費領取福利卡！`,
        url: window.location.href
      };

      if (navigator.share) {
        navigator.share(shareData).catch(console.error);
      } else {
        // 降級處理：複製純文字
        try {
          const dummyText = document.createElement("textarea");
          document.body.appendChild(dummyText);
          dummyText.value = `${shareData.text}\n${shareData.url}`;
          dummyText.select();
          document.execCommand("copy");
          document.body.removeChild(dummyText);
          alert("✅ 優惠資訊已複製到剪貼簿！快去貼給朋友吧！");
        } catch (err) {
          alert("請手動複製網址分享！");
        }
      }
    }

    function showDetails(storeName) {
      alert(`🌸 歡迎光臨【${storeName}】\n\n請務必於結帳前出示「頭竹苗大家庭」數位福利卡，以享有此專屬特約優惠。\n(詳細營業時間與規範請依店家現場公告為主)`);
    }

    function handleFormSubmit(event) {
      event.preventDefault(); 
      const storeName = document.getElementById('f_storeName').value;
      alert(`🎉 感謝您的申請！\n【${storeName}】的資料已送出。\n管理員審核後將會盡快為您上架/更新！`);
      event.target.reset();
    }
  </script>
